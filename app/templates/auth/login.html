<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – OSINT Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center dark bg-gray-950">
  <div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-indigo-400">OSINT Tracker</h1>
      <p class="text-gray-400 text-sm mt-1">Ethical Open Source Intelligence</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8">
      <h2 class="text-xl font-semibold text-white mb-6">Sign In</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="mb-4 px-4 py-3 rounded-lg text-sm
              {% if category == 'error' %}bg-red-900/50 border border-red-700 text-red-200
              {% else %}bg-green-900/50 border border-green-700 text-green-200{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Username</label>
          <input type="text" name="username" required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 text-sm"
            placeholder="Enter username">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 text-sm"
            placeholder="Enter password">
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors">
          Sign In
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="text-indigo-400 hover:text-indigo-300">Register</a>
      </p>

      <p class="mt-4 text-center text-xs text-gray-600">
        Demo: admin / changeme
      </p>
    </div>
  </div>
</body>
</html>
