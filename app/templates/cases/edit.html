{% extends "base.html" %}
{% block title %}Edit Case – OSINT Tracker{% endblock %}

{% block content %}
<div class="max-w-xl">
  <a href="{{ url_for('cases.detail', case_id=case.id) }}" class="text-gray-400 hover:text-white text-sm mb-4 inline-block">← Back to Case</a>
  <h1 class="text-2xl font-bold text-white mb-6">Edit Case</h1>

  <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
    <form method="post" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Title *</label>
        <input type="text" name="title" required value="{{ case.title }}"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm">
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Description</label>
        <textarea name="description" rows="3"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm">{{ case.description }}</textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Status</label>
          <select name="status"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm">
            <option value="open" {% if case.status == 'open' %}selected{% endif %}>Open</option>
            <option value="in_progress" {% if case.status == 'in_progress' %}selected{% endif %}>In Progress</option>
            <option value="closed" {% if case.status == 'closed' %}selected{% endif %}>Closed</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Priority</label>
          <select name="priority"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm">
            <option value="low" {% if case.priority == 'low' %}selected{% endif %}>Low</option>
            <option value="medium" {% if case.priority == 'medium' %}selected{% endif %}>Medium</option>
            <option value="high" {% if case.priority == 'high' %}selected{% endif %}>High</option>
            <option value="critical" {% if case.priority == 'critical' %}selected{% endif %}>Critical</option>
          </select>
        </div>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors">
          Save Changes
        </button>
        <a href="{{ url_for('cases.detail', case_id=case.id) }}"
           class="bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
